<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="A 3D card table where you can spread a deck and learn to shuffle — riffle, overhand, wash and more — step by step."
    />

    <!-- OpenGraph / Twitter — og.png is regenerated from code on every build
         (scripts/generate-og.mjs), so it never needs a manual screenshot swap. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cardistry" />
    <meta property="og:title" content="Cardistry — 3D Card Table & Shuffle Trainer" />
    <meta
      property="og:description"
      content="Spread a deck and learn to shuffle — riffle, overhand, wash and more — step by step."
    />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cardistry — 3D Card Table & Shuffle Trainer" />
    <meta
      name="twitter:description"
      content="Spread a deck and learn to shuffle — riffle, overhand, wash and more — step by step."
    />
    <meta name="twitter:image" content="/og.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <title>Cardistry — 3D Card Table & Shuffle Trainer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
